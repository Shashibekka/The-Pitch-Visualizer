<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DarwixAI - Pitch Visualizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 50px auto; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { color: #1a1a1a; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; margin-bottom: 15px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        select { width: 100%; padding: 12px; margin-bottom: 25px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #0d6efd; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0b5ed7; }
        #loading { display: none; margin-top: 20px; font-weight: bold; color: #0d6efd; text-align: center; }
    </style>
</head>
<body>
    <h1>The Pitch Visualizer</h1>
    <p>Transform your customer success stories into compelling visual storyboards.</p>
    
    <form action="/generate" method="POST" onsubmit="document.getElementById('loading').style.display='block';">
        <label for="narrative"><strong>Your Narrative:</strong></label>
        <textarea name="narrative" required placeholder="The team was overwhelmed with manual data entry. Errors were increasing daily. Finally, they implemented DarwixAI and automated the whole process."></textarea>
        
        <label for="style"><strong>Select Visual Style:</strong></label>
        <select name="style" id="style">
            <option value="cinematic">Cinematic Realism</option>
            <option value="sketch">Storyboard Sketch</option>
            <option value="comic">Comic Book</option>
            <option value="watercolor">Watercolor Art</option>
        </select>
        
        <button type="submit">Generate Storyboard</button>
    </form>
    
    <div id="loading">✨ Engineering prompts and generating artwork... Please wait.</div>
</body>
</html>
